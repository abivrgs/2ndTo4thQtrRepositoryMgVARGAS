<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Form</title>

    <style>
        .error {
            border: 2px solid red;
            background-color: #fcc3c3;
        }

        fieldset {
            margin-bottom: 15px;
            padding: 15px;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }
    </style>

    <script>
        function confirmSubmit() {
            if (!confirm("Are you sure you want to submit this application?")) {
                return false;
            }

            let form = document.forms[0];

            let signup = {
                student_id: form.student_id.value,
                full_name: form.full_name.value,
                birthday: form.birthday.value,
                email: form.email.value,
                mobile: form.mobile.value,
                grade_level: form.grade_level.options[form.grade_level.selectedIndex].text,
                status: document.querySelector('input[name="status"]:checked').value,
                club: form.club.value,
                reason: form.reason.value
            };

            let list = localStorage.getItem("signups");
            list = list ? JSON.parse(list) : [];
            list.push(signup);
            localStorage.setItem("signups", JSON.stringify(list));

            alert("Application submitted!");
            form.reset();
            return false;
        }

        function confirmReset() {
            return confirm("Are you sure you want to reset the form?");
        }

        function checkEmpty(field) {
            if (field.value.trim() === "") {
                field.classList.add("error");
            } else {
                field.classList.remove("error");
            }
        }

        function viewSignups() {
            window.location.href = "viewSignUps.html";
        }
    </script>
</head>

<body>

<form method="post"
      onsubmit="return confirmSubmit();"
      onreset="return confirmReset();">

    <fieldset>
        <legend>Personal Information</legend>

        <label>
            Student ID:
            <input type="number" name="student_id" required onblur="checkEmpty(this)">
        </label>

        <label>
            Full Name:
            <input type="text" name="full_name" required onblur="checkEmpty(this)">
        </label>

        <label>
            Birthday:
            <input type="date" name="birthday" required>
        </label>

        <label>
            Email Address:
            <input type="email" name="email" required>
        </label>
    </fieldset>

    <fieldset>
        <legend>Other Details / Information Needed</legend>

        <label>
            Mobile Phone:
            <input type="text" name="mobile" required onblur="checkEmpty(this)">
        </label>

        <label>
            Grade Level:
            <select name="grade_level" required>
                <option value="">-- Select Grade Level --</option>
                <option>Grade 7</option>
                <option>Grade 8</option>
                <option>Grade 9</option>
                <option>Grade 10</option>
                <option>Grade 11</option>
                <option>Grade 12</option>
            </select>
        </label>

        <label>
            Intern / Extern:
            <input type="radio" name="status" value="Intern" required> Intern
            <input type="radio" name="status" value="Extern" required> Extern
        </label>

        <label>
            Preferred Organization / Club:
            <select name="club" required>
                <option value="">-- Select Club --</option>
                <option>Volleyball Club</option>
                <option>Math Club</option>
                <option>Arts and Literature</option>
                <option>Science Club</option>
                <option>Music Club</option>
                <option>Media and Publications</option>
            </select>
        </label>

        <label>
            Why do you want to join?
            <textarea name="reason" rows="4" required onblur="checkEmpty(this)"></textarea>
        </label>
    </fieldset>

    <input type="submit" value="Submit Application">
    <input type="reset" value="Reset Form">
    <input type="button" value="View Signups" onclick="viewSignups()">

</form>

</body>
</html>
