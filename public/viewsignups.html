<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Sign-ups</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #002b80;
            color: white;
        }

        .message {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>

    <script>
        function loadSignups() {
            let list = localStorage.getItem("signups");
            list = list ? JSON.parse(list) : [];

            let club = document.getElementById("clubFilter").value;
            let table = document.getElementById("data");
            let total = document.getElementById("total");
            let msg = document.getElementById("msg");

            table.innerHTML = "";
            msg.innerHTML = "";

            let filtered = club === "ALL" ? list : list.filter(s => s.club === club);

            total.innerHTML = filtered.length;

            if (list.length === 0) {
                msg.innerHTML = "No sign-ups saved.";
                return;
            }

            if (filtered.length === 0) {
                msg.innerHTML = "No sign-ups for this club.";
                return;
            }

            filtered.forEach(s => {
                table.innerHTML += `
                    <tr>
                        <td>${s.club}</td>
                        <td>${s.student_id}</td>
                        <td>${s.full_name}</td>
                        <td>${s.grade_level}</td>
                        <td>${s.email}</td>
                        <td>${s.mobile}</td>
                        <td>${s.status}</td>
                    </tr>
                `;
            });
        }
    </script>
</head>

<body onload="loadSignups()">

<a href="Q3_2GMagnesiumVargas.html">Back to Signup</a>

<h2>Show List of Students Who Signed-Up</h2>

<label>
    Select Your Club:
    <select id="clubFilter" onchange="loadSignups()">
        <option value="ALL">ALL</option>
        <option>Volleyball Club</option>
        <option>Math Club</option>
        <option>Arts and Literature</option>
        <option>Science Club</option>
        <option>Music Club</option>
        <option>Media and Publications</option>
    </select>
</label>

<p>Total Sign-up: <span id="total">0</span></p>

<table>
    <thead>
        <tr>
            <th>Club</th>
            <th>ID</th>
            <th>Fullname</th>
            <th>Grade</th>
            <th>Email</th>
            <th>Mobile</th>
            <th>Intern | Extern</th>
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>

<div id="msg" class="message"></div>

</body>
</html>
