<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="<your names>" />
    <meta name="revised" content="<date today>" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      .header,
      .footer {
        background: lightblue;
        padding: 10px;
      }

      .footer {
        opacity: 0.5;
        position: fixed;
        bottom: 0;
        width: 100%;
      }

      .sidebar {
        background: lightgreen;
        width: 150px;
        height: 200px;
        position: relative;
        top: 10px;
        left: 20px;
      }

      .content {
        background: lightyellow;
        width: 300px;
        height: 200px;
        position: absolute;
        top: 66px;
        left: 200px;
        z-index: 1;
      }

      .notice {
        position: absolute;
        top: 60px;
        left: 400px;
        background: rgb(90, 175, 255);
        padding: 10px;
        z-index: 2;
      }
    </style>
  </head>

  <body>
    <div class="header">Header</div>
    <div class="sidebar">Sidebar</div>
    <div class="content">Main Content</div>
    <div class="notice">Notice!</div>
    <div class="footer">Footer</div>
  </body>
</html>
